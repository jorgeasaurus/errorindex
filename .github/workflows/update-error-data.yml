name: Update error data

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: update-error-data
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      changes_detected: ${{ steps.auto-commit.outputs.changes_detected }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape error documentation
        run: python3 scripts/scrape_errors.py

      - name: Commit updated data
        id: auto-commit
        run: |
          git add public/data/**
          if git diff --cached --quiet; then
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                commit -m "chore: update error data"
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: git push

  deploy:
    needs: update-data
    if: needs.update-data.outputs.changes_detected == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
